                <legend>Registro de aventureiro</legend>
                <label for="name">Nome do herói</label>

                <label for="pass">Senha ultra-secreta</label>
                <input type="password" id="pass" placeholder="extremamente secreta">

                <button class="magic-button" type="submit">Entrar na guilda</button><button class="goblin-button" type="reset">Eu sou um goblin!</button>
        
            </fieldset>
