<!DOCTYPE html>
<html>
    <head>
        <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
       
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="../../CSS/css_practice.css">

    </head>
    <body class="" id="body-a">
        <div class="vanish" id="welcome"></div>
        <div class="seal-msg" id="seal-msg"></div>
        <button class="logout" id="btn-logout">Logout</button>
        <button class="seal" type="button" id="btn-enter"></button>

        <form class="form-register">
            <fieldset>
                <legend>Registro de aventureiro</legend>
                <label for="name">Nome do herói</label>
                <input type="text" id="name">
            
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="para o envio de corujas altamente treinadas">

                <label for="pass">Senha ultra-secreta</label>
                <input type="password" id="pass" placeholder="extremamente secreta">

                <button class="magic-button btn" type="submit">Entrar na guilda</button><button class="goblin-button btn" type="reset">Eu sou um goblin!</button>
        
            </fieldset>
        </form>
        <div class="vanish" id="mural">
            <div id="mission-zone"></div>
            <form class="newmission">
                <fieldset>
                    <legend>Adicionar nova missão</legend>
                    <label for="new-mission"></label>
                    <input type="text" id="new-mission">
                    <button class="magic-button btn" type="submit" id="new-mission-btn">Registrar missão</button>
                </fieldset>
            </form>
        </div>    

    <script src="../../JS/main.js"></script>
    </body>


</html>
