<html>
    <head>
        <style>

            th, td, table {
                border: 0.5px outset #3A3F40;
                border-radius: 5px;
                size: 10px;
                border-spacing: 5px;
            }
            td {
                text-decoration: wavy;
                background-color: slategray;
            }
            table {
                background-color: #155a65;
            }
            th {
                background-color: #255e30;
            }
        
        </style>
    </head>
    <body>

        <h2>Simple table with colspan</h2>
        
        <table width="100%">
            <thead>
                <th>Aluno</th> <th colspan="2">Disciplina</th>
            </thead>
            <tbody>
                <tr>

                    <td>Alex</td> <td>HTML</td>
                
                </tr>
                <tr>

                </tr>
            </tbody>

        </table>
    
    </body>
</html>
